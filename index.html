<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitation Builder</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Hero -->
    <section class="hero">
      <h1>Create Stunning Invitations ✨</h1>
      <p>Modern, interactive, and mobile-first invitation builder</p>
    </section>

    <!-- Features -->
    <section class="features">
      <div class="card">
        <h3>Interactive RSVP</h3>
        <p>Guests respond instantly with a smooth UI.</p>
        <button class="demoBtn">View Demo</button>
      </div>

      <div class="card">
        <h3>Elegant Themes</h3>
        <p>Premium wedding-style templates.</p>
        <button class="demoBtn">View Demo</button>
      </div>

      <div class="card">
        <h3>Mobile Experience</h3>
        <p>Optimized for real-world usage.</p>
        <button class="demoBtn">View Demo</button>
      </div>
    </section>

    <!-- Modal -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <button id="closeBtn">&times;</button>

        <!-- iPhone Frame -->
        <div class="mobile-frame">
          <div class="notch"></div>

          <iframe src="https://konarkone.github.io/Invitation-modals/">
          </iframe>

          <div class="home-indicator"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
